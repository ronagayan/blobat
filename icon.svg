<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark background -->
  <rect width="512" height="512" rx="96" fill="#060e14"/>

  <defs>
    <!-- Subtle glow behind blob -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#44ff88" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#44ff88" stop-opacity="0"/>
    </radialGradient>
    <!-- Main blob gradient -->
    <radialGradient id="blob" cx="36%" cy="30%" r="66%">
      <stop offset="0%"   stop-color="#c8ff55"/>
      <stop offset="45%"  stop-color="#55cc22"/>
      <stop offset="100%" stop-color="#1f8010"/>
    </radialGradient>
  </defs>

  <!-- Background glow -->
  <circle cx="256" cy="240" r="195" fill="url(#glow)"/>

  <!-- Blob drop-shadow -->
  <ellipse cx="270" cy="360" rx="105" ry="24" fill="#000" opacity="0.38"/>

  <!-- Dark rim ring -->
  <circle cx="256" cy="232" r="130" fill="#165010"/>

  <!-- Main coloured body -->
  <circle cx="256" cy="232" r="130" fill="url(#blob)"/>

  <!-- Highlight gloss -->
  <ellipse cx="210" cy="183" rx="44" ry="30" fill="rgba(255,255,255,0.22)" transform="rotate(-15,210,183)"/>

  <!-- Eyes – dark pupils -->
  <circle cx="222" cy="228" r="20" fill="#165010"/>
  <circle cx="290" cy="228" r="20" fill="#165010"/>

  <!-- Eyes – white reflect -->
  <circle cx="228" cy="221" r="9"  fill="#ffffff"/>
  <circle cx="296" cy="221" r="9"  fill="#ffffff"/>

  <!-- Tiny muzzle flash hint (orange) -->
  <circle cx="395" cy="232" r="22" fill="#ff6600" opacity="0.75"/>
  <circle cx="395" cy="232" r="14" fill="#ffcc00" opacity="0.85"/>
  <!-- Bullet trail -->
  <rect x="305" y="226" width="74" height="12" rx="6" fill="#ffe455" opacity="0.88"/>
</svg>
